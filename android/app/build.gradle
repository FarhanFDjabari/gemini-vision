plugins {
    id "com.android.application"
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

android {
    namespace = "my.djabari.dev.gemini_vision"
    compileSdk = 36
    ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_21
        targetCompatibility = JavaVersion.VERSION_21
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_21
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId = "my.djabari.dev.gemini_vision"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        // LiteRT-LM GPU runtime requires API 26+.
        minSdkVersion = 26
        targetSdk = 36
        versionCode = flutter.versionCode
        versionName = flutter.versionName

        // Real Android devices are arm; drop x86/x86_64 (emulator-only) to
        // shrink the package. Play delivers a single ABI per device from the AAB.
        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a"
        }
    }

    // Support 16 KB memory page sizes: package native libraries uncompressed
    // and 16 KB-aligned so the loader can mmap them directly (Android 15+).
    packaging {
        jniLibs {
            useLegacyPackaging = false
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.debug
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

// The app uses on-device multimodal input (tasks-genai) but never generates
// images, so exclude flutter_gemma's transitive image-generator AAR (~43 MB/ABI).
configurations.all {
    exclude group: "com.google.mediapipe", module: "tasks-vision-image-generator"
}

flutter {
    source = "../.."
}
